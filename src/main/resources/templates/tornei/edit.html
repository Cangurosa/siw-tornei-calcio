<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nuovo Torneo</title>
    <link rel="stylesheet" th:href="@{/css/style2.css}">
</head>
<body>
<div class="card">
    <h1>Modifica Torneo</h1>
    <form th:action="@{/tornei/torneoSalvaModificato}" method="POST">
        <input type="hidden" name="id" th:value="${torneo.id}" />

        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" th:value="${torneo.nome}" required>

        <label for="anno">Anno:</label>
        <input type="number" id="anno" name="anno" th:value="${torneo.anno}" required>

        <label for="descrizione">Descrizione:</label>
        <textarea id="descrizione" name="descrizione" rows="4" required th:text="${torneo.descrizione}"></textarea>

        <button type="submit" class="button">Salva Modifiche</button>
    </form>
</div>

</body>
</html>
