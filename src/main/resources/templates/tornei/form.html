<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nuovo Torneo</title>
    <link rel="stylesheet" th:href="@{/css/style2.css}">
</head>
<body>

<div class="container">

    <h1>Nuovo Torneo</h1>

    <div class="card">

        <form th:action="@{/torneo}" th:object="${torneo}" method="post">

            <label>Nome</label>
            <input type="text" th:field="*{nome}" required>

            <label>Anno</label>
            <input type="number" th:field="*{anno}" required>

            <label>Descrizione</label>
            <textarea th:field="*{descrizione}" rows="4"></textarea>

            <button type="submit" class="button">Crea Torneo</button>

        </form>

    </div>

    <div style="margin-top: 1rem; text-align: center;">
        <a th:href="@{/tornei}" class="button button-secondary">← Torna ai tornei</a>
    </div>

</div>

</body>
</html>
