<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nuovo Giocatore</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>Nuovo Giocatore</h1>
<div class="card">
    <form th:action="@{/giocatore}" th:object="${giocatore}" method="post">
        <label>Nome</label>
        <input type="text" th:field="*{nome}" required />

        <label>Cognome</label>
        <input type="text" th:field="*{cognome}" required />

        <label>Ruolo</label>
        <input type="text" th:field="*{ruolo}" required />

        <label>Altezza (in metri)</label>
        <input type="number" step="0.01" th:field="*{altezza}" required />

        <label>Squadra</label>
        <select name="squadraId" required>
            <option value="" disabled selected>Seleziona una squadra</option>
            <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}"></option>
        </select>

        <button type="submit">Salva giocatore</button>
    </form>
</div>
</body>
</html>
