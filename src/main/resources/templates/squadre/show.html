<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Dettaglio Squadra</title>
    <link rel="stylesheet" th:href="@{/css/style2.css}">
</head>
<body>

<div class="container">

    <!-- INFO SQUADRA -->
    <div class="card">
        <h1 th:text="${squadra.nome}"></h1>

        <p>
            <strong>Città:</strong>
            <span th:text="${squadra.citta}"></span>
        </p>

        <p>
            <strong>Anno fondazione:</strong>
            <span th:text="${squadra.annoFondazione}"></span>
        </p>
    </div>

    <!-- GIOCATORI -->
    <div class="card">
        <h2>Giocatori</h2>

        <ul>
            <li th:each="giocatore : ${squadra.giocatori}">
                <span class="player-name" th:text="${giocatore.nome}"></span>
                <span class="player-name" th:text="${giocatore.cognome}"></span>
                -
                <span class="role" th:text="${giocatore.ruolo}"></span>
                (<span class="height" th:text="${giocatore.altezza}"></span> cm)
            </li>
        </ul>
    </div>

    <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-top: 1rem;">
        <a href="/tornei" class="button button-secondary">← Torna ai tornei</a>
        <a href="/giocatore/nuovo" class="button" sec:authorize="hasRole('ADMIN')">← Aggiungi giocatore</a>
        <a th:href="@{/squadra/{id}/modificaSquadra(id=${squadra.id})}" class="button button-secondary" sec:authorize="hasRole('ADMIN')">Modifica Squadra</a>
    </div>
</div>

</body>
</html>
