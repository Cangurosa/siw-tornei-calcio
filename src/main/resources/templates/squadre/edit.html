<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nuovo Torneo</title>
    <link rel="stylesheet" th:href="@{/css/style2.css}">
</head>
<body>
<div class="card">
    <h1>Modifica Squadra</h1>
    <form th:action="@{/squadra/salvaSquadraModificata}" method="POST">
        <input type="hidden" name="id" th:value="${squadra.id}" />

        <label for="nome">Nome Squadra</label>
        <input type="text" id="nome" name="nome" th:value="${squadra.nome}" required>

        <label for="annoFondazione">Anno Fondazione</label>
        <input type="number" id="annoFondazione" name="annoFondazione" th:value="${squadra.annoFondazione}" required>

        <label for="citta">Citta' Squadra</label>
        <input type="text" id="citta" name="citta" th:value="${squadra.citta}" required>

        <button type="submit" class="button">Salva Modifiche</button>
    </form>
</div>

</body>
</html>
