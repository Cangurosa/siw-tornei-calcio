<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nuova Squadra</title>
    <link rel="stylesheet" th:href="@{/css/style2.css}">
</head>
<body>

<div class="container">

    <h1>Nuova Squadra</h1>

    <div class="card">

        <form th:action="@{/squadra}" th:object="${squadra}" method="post">

            <label>Nome</label>
            <input type="text" th:field="*{nome}" required>

            <label>Anno creazione</label>
            <input type="number" th:field="*{annoFondazione}" required>

            <label>Città</label>
            <input type="text" th:field="*{citta}" required>

            <button type="submit" class="button">Inserisci Squadra</button>

        </form>

    </div>

    <div style="margin-top: 1rem; text-align: center;">
        <a th:href="@{/squadre}" class="button button-secondary">← Torna alle squadre</a>
    </div>

</div>

</body>
</html>
