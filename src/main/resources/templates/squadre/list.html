<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Squadre</title>
    <link rel="stylesheet" th:href="@{/css/style2.css}">
</head>
<body>

<div class="container">
    <h1>Squadre Registrate</h1>

    <div class="card">
        <ul style="margin-bottom: 0;">
            <li th:each="s : ${squadre}" style="margin-bottom: 0.75rem;">
                <a th:href="@{'/squadra/' + ${s.id}}" th:text="${s.nome}"></a>
            </li>
        </ul>
    </div>

    <div style="margin-top: 1.5rem; display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
        <a th:href="@{/}" class="button button-secondary">← Torna al Menù</a>
        <a th:href="@{/squadra/nuova}" class="button" sec:authorize="hasRole('ADMIN')">Nuova Squadra</a>
    </div>
</div>

</body>
</html>
