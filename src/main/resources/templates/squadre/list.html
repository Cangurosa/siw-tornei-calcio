<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Squadre</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<h1>Squadre</h1>

<div class="container">
    <ul>
        <li th:each="s : ${squadre}">
            <a th:href="@{'/squadra/' + ${s.id}}">
                <span th:text="${s.nome}"></span>
            </a>
        </li>
    </ul>
</div>

</body>
</html>
