<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Partite</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: auto;
            margin-top: 30px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        .card {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background-color: #3498db;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        .risultato {
            font-weight: bold;
        }

        .stato {
            font-size: 0.9em;
            padding: 4px 8px;
            border-radius: 6px;
            color: white;
        }

        .finita {
            background-color: #27ae60;
        }

        .programmata {
            background-color: #f39c12;
        }

        a {
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
        }

        a:hover {
            color: #1d6fa5;
        }

        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 15px;
            background-color: #3498db;
            color: white;
            border-radius: 6px;
        }

        .button:hover {
            background-color: #2980b9;
        }

        .empty {
            text-align: center;
            color: #777;
            margin-top: 20px;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>Calendario Partite</h1>

    <div class="card">

        <div th:if="${partite == null || partite.isEmpty()}" class="empty">
            <p>Nessuna partita disponibile.</p>
        </div>

        <table th:if="${partite != null && !partite.isEmpty()}">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Casa</th>
                    <th>Trasferta</th>
                    <th>Risultato</th>
                    <th>Luogo</th>
                    <th>Stato</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="partita : ${partite}">
                    <td th:text="${partita.dataOra}"></td>

                    <td th:text="${partita.squadraHome.nome}"></td>

                    <td th:text="${partita.squadraAway.nome}"></td>

                    <td class="risultato">
                        <span th:text="${partita.goalsHome}"></span>
                        -
                        <span th:text="${partita.goalsAway}"></span>
                    </td>

                    <td th:text="${partita.luogo}"></td>

                    <td>
                        <span class="stato"
                              th:text="${partita.stato}"
                              th:classappend="${partita.stato == 'FINITA'} ? ' finita' : ' programmata'">
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

    <a th:href="@{/tornei}" class="button">← Torna ai tornei</a>

</div>

</body>
</html>
