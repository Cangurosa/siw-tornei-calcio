<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dettaglio Squadra</title>
</head>
<body>

<h1 th:text="${squadra.nome}"></h1>

<p>
    <strong>Città:</strong>
    <span th:text="${squadra.citta}"></span>
</p>

<p>
    <strong>Anno fondazione:</strong>
    <span th:text="${squadra.annoFondazione}"></span>
</p>

<h2>Giocatori</h2>

<ul>
    <li th:each="giocatore : ${squadra.giocatori}">
        <span th:text="${giocatore.nome}"></span>
        <span th:text="${giocatore.cognome}"></span>
        - <span th:text="${giocatore.ruolo}"></span>
        (<span th:text="${giocatore.altezza}"></span> m)
    </li>
</ul>

<a href="/tornei">← Torna ai tornei</a>

</body>
</html>
