<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Classifica</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 60%;
            margin: auto;
            margin-top: 30px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        .card {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #3498db;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        /* POSIZIONI */
        .posizione {
            font-weight: bold;
        }

        .top1 {
            background-color: #f1c40f;
            color: white;
            border-radius: 6px;
            padding: 4px 8px;
        }

        .top2 {
            background-color: #bdc3c7;
            color: white;
            border-radius: 6px;
            padding: 4px 8px;
        }

        .top3 {
            background-color: #cd7f32;
            color: white;
            border-radius: 6px;
            padding: 4px 8px;
        }

        .punti {
            font-weight: bold;
            color: #2c3e50;
        }

        a {
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
        }

        a:hover {
            color: #1d6fa5;
        }

        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 15px;
            background-color: #3498db;
            color: white;
            border-radius: 6px;
        }

        .button:hover {
            background-color: #2980b9;
        }
    </style>

</head>
<body>

<div class="container">

    <h1>Classifica</h1>

    <div class="card">

        <table>
            <thead>
                <tr>
                    <th>Posizione</th>
                    <th>Squadra</th>
                    <th>Punti</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="c, iter : ${classifica}">

                    <td class="posizione">
                        <span th:text="${iter.index + 1}"
                              th:classappend="${iter.index == 0} ? ' top1' :
                                              (${iter.index == 1} ? ' top2' :
                                              (${iter.index == 2} ? ' top3' : ''))">
                        </span>
                    </td>

                    <td th:text="${c.squadra.nome}"></td>

                    <td class="punti" th:text="${c.punti}"></td>

                </tr>
            </tbody>
        </table>

    </div>

    <a th:href="@{/tornei}" class="button">← Torna ai tornei</a>

</div>

</body>
</html>
