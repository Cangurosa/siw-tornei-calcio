<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista Tornei</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-top: 30px;
        }

        .container {
            width: 60%;
            margin: auto;
            margin-top: 30px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: white;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        li:hover {
            transform: translateY(-3px);
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15);
        }

        a {
            text-decoration: none;
            color: #3498db;
            font-size: 18px;
            font-weight: bold;
        }

        a:hover {
            color: #1d6fa5;
        }

        span {
            color: #555;
            margin-left: 10px;
        }
    </style>

</head>
<body>

<h1>Lista Tornei</h1>

<div class="container">
    <ul>
        <li th:each="torneo : ${tornei}">
            <a th:href="@{'/torneo/' + ${torneo.id}}">
                <span th:text="${torneo.nome}"></span>
            </a>
            - <span th:text="${torneo.anno}"></span>
        </li>
    </ul>
</div>

</body>
</html>
