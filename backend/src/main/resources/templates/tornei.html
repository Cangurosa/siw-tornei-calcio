<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista Tornei</title>
</head>
<body>

<h1>Lista Tornei</h1>

<ul>
    <li th:each="torneo : ${tornei}">
        <a th:href="@{'/torneo/' + ${torneo.id}}">
            <span th:text="${torneo.nome}"></span>
        </a>
        - <span th:text="${torneo.anno}"></span>
    </li>
</ul>

</body>
</html>
