<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nuovo Torneo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 40%;
            margin: auto;
            margin-top: 50px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #34495e;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }

        a {
            display: block;
            margin-top: 15px;
            text-align: center;
            text-decoration: none;
            color: #3498db;
        }

        a:hover {
            color: #1d6fa5;
        }
    </style>

</head>
<body>
    <div class="card">
        <h1>Modifica Torneo</h1>
        <form th:action="@{/tornei/torneoSalvaModificato}" method="POST">
            <input type="hidden" name="id" th:value="${torneo.id}" />
            
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" th:value="${torneo.nome}" required>

            <label for="anno">Anno:</label>
            <input type="number" id="anno" name="anno" th:value="${torneo.anno}" required>

            <label for="descrizione">Descrizione:</label>
            <textarea id="descrizione" name="descrizione" rows="4" required th:text="${torneo.descrizione}"></textarea>

            <button type="submit">Salva Modifiche</button>
        </form>
    </div>

</body>
</html>
