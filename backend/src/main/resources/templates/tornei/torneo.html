<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dettaglio Torneo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 70%;
            margin: auto;
            margin-top: 30px;
        }

        h1 {
            color: #2c3e50;
        }

        h2 {
            color: #34495e;
            margin-top: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 10px;
            margin-bottom: 8px;
            background: #fafafa;
            border-radius: 6px;
            transition: background 0.2s;
        }

        li:hover {
            background: #f0f0f0;
        }

        a {
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
        }

        a:hover {
            color: #1d6fa5;
        }

        .button {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background-color: #3498db;
            color: white;
            border-radius: 6px;
        }

        .button:hover {
            background-color: #2980b9;
        }

        .links {
            margin-top: 20px;
        }
    </style>

</head>
<body>

<div class="container">

    <!-- INFO TORNEO -->
    <div class="card">
        <h1 th:text="${torneo.nome}"></h1>

        <p>
            <strong>Anno:</strong>
            <span th:text="${torneo.anno}"></span>
        </p>

        <p>
            <strong>Descrizione:</strong>
            <span th:text="${torneo.descrizione}"></span>
        </p>
    </div>

    <!-- SQUADRE -->
    <div class="card">
        <h2>Squadre partecipanti</h2>

        <ul>
            <li th:each="squadra : ${torneo.squadre}">
                <a th:href="@{'/squadra/' + ${squadra.id}}">
                    <span th:text="${squadra.nome}"></span>
                </a>
                - <span th:text="${squadra.citta}"></span>
            </li>
        </ul>
    </div>

    <!-- AZIONI -->
    <div class="card">

        <a th:href="@{'/torneo/' + ${torneo.id} + '/classifica'}" class="button">
            Vedi classifica
        </a>

        <br><br>

        <a th:href="@{/torneo/{id}/partite(id=${torneo.id})}" class="button">
            Vedi calendario partite
        </a>

        <div class="links">
            <p>
                <a href="/tornei">← Torna alla lista tornei</a>
            </p>
            <p>
                <a th:href="@{/tornei/torneo/{id}/modifica(id=${torneo.id})}">← Modifica Torneo</a>
            </p>
        </div>

    </div>

</div>

</body>
</html>
